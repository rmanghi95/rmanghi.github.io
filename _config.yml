# Basic Site Settings
locale: "en-US"
site_theme: "default"
title: "Riccardo Manghi"
title_separator: "-"
name: &name "Riccardo Manghi"
description: &description "Postdoctoral Researcher in Economics | LUISS Guido Carli University"
url: https://rmanghi.github.io
baseurl: ""
repository: "rmanghi/rmanghi.github.io"

# Site Author
author:
  avatar: "profile.png"
  name: "Riccardo Manghi"
  pronouns: ""
  bio: " My research focuses on experimental and behavioral economics, with particular interest in how individuals process risk and information."
  location: "Rome, Italy"
  employer: "LUISS Guido Carli University"
  uri: "https://rmanghi.github.io"
  email: "rmanghi@luiss.it"

  # Academic profiles
  academia: ""
  arxiv: ""
  googlescholar: ""
  inspire-hep: ""
  impactstory: ""
  orcid: ""
  semantic: ""
  ssrn: ""
  pubmed: ""
  researchgate: ""
  scopus: ""
  zotero: ""

  # Repositories
  github: "rmanghi"
  bitbucket: ""
  kaggle: ""
  stackoverflow: ""

  # Social media
  twitter: ""
  linkedin: ""
  bluesky: ""
  mastodon: ""
  medium: ""
  instagram: ""
  facebook: ""

# Publication Categories
publication_category:
  books:
    title: 'Books'
  manuscripts:
    title: 'Journal Articles'
  conferences:
    title: 'Conference Papers'

# Site Settings
teaser: ""
breadcrumbs: false
words_per_minute: 160
future: true
read_more: "disabled"
talkmap_link: false

comments:
  provider: false

atom_feed:
  hide: false

# SEO
google_site_verification: ""
bing_site_verification: ""

# Social Sharing
twitter:
  username: ""
facebook:
  username: ""
og_image: ""
og_description: ""

social:
  type: "Person"
  name: "Riccardo Manghi"
  links:
    - "https://rmanghi.github.io"

analytics:
  provider: false

# Reading Files
include:
  - .htaccess
  - _pages
  - files

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor

keep_files:
  - .git
  - .svn

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true
      comment: true
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true

sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
timezone: Etc/UTC

plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

compress_html:
  clippings: all
  ignore:
    envs: development
